<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRUPO Z</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        
        .bg-doodles {
            background-color: #fefce8;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 15c-5 0-9 4-9 9s4 9 9 9 9-4 9-9-4-9-9-9zm0 14c-2.8 0-5-2.2-5-5s2.2-5 5-5 5 2.2 5 5-2.2 5-5 5zM10 40c-3 0-5 2-5 5s2 5 5 5 5-2 5-5-2-5-5-5zm40 0c-3 0-5 2-5 5s2 5 5 5 5-2 5-5-2-5-5-5z' fill='%23eab308' fill-opacity='0.15'/%3E%3Ccircle cx='15' cy='15' r='2' fill='%23eab308' fill-opacity='0.15'/%3E%3Ccircle cx='45' cy='45' r='2' fill='%23eab308' fill-opacity='0.15'/%3E%3C/svg%3E");
        }

        .message-bubble { 
            max-width: 85%; 
            border-radius: 1.2rem; 
            padding: 0.7rem 1rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            position: relative;
        }
        
        .bubble-gines { background-color: #ffffff; color: #1e293b; border: 1px solid #e2e8f0; border-bottom-left-radius: 4px; }
        .bubble-antonio { background-color: #22c55e; color: #ffffff; border-bottom-right-radius: 4px; }

        .accent-yellow { background-color: #facc15; color: #713f12; }
        
        .date-separator {
            background-color: #facc15;
            color: #713f12;
            font-size: 0.65rem;
            font-weight: 900;
            padding: 0.25rem 0.75rem;
            border-radius: 99px;
            text-transform: uppercase;
            margin: 1.5rem auto 1rem;
            display: inline-block;
        }

        .recording-pulse {
            animation: pulse-red 1.5s infinite;
            background-color: #ef4444 !important;
            color: white !important;
        }

        @keyframes pulse-red {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        audio {
            border-radius: 10px;
            margin-top: 5px;
            max-width: 100%;
        }

        .chat-img {
            border-radius: 0.75rem;
            cursor: pointer;
            max-height: 250px;
            object-fit: cover;
            width: 100%;
            margin-top: 5px;
        }

        #img-modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(15, 23, 42, 0.8);
            backdrop-blur: 8px;
            padding: 20px;
            align-items: center;
            justify-content: center;
        }

        #emoji-panel {
            display: none;
            position: absolute;
            bottom: 80px;
            left: 20px;
            background: white;
            padding: 10px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            grid-template-columns: repeat(6, 1fr);
            gap: 5px;
            z-index: 50;
            border: 2px solid #facc15;
        }

        .tts-btn {
            opacity: 0.6;
            transition: opacity 0.2s;
        }
        .tts-btn:hover {
            opacity: 1;
        }
    </style>
</head>
<body class="bg-doodles min-h-[100dvh] flex flex-col">

    <!-- Login -->
    <div id="login-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4">
        <div class="bg-white rounded-3xl shadow-2xl p-8 w-full max-w-xs text-center border-4 border-yellow-400">
            <div class="text-6xl mb-4">🍋</div>
            <h1 class="text-2xl font-black text-slate-800 mb-1">GRUPO Z</h1>
            <input type="password" id="access-code" maxlength="4" placeholder="••••" 
                   class="w-full text-center text-3xl font-bold tracking-[0.5em] px-4 py-4 rounded-2xl border-2 border-slate-100 focus:border-yellow-400 outline-none transition-all mb-4 bg-slate-50 mt-4">
            <button onclick="attemptLogin()" class="w-full accent-yellow hover:bg-yellow-500 font-black py-4 rounded-2xl shadow-lg text-lg">ENTRAR</button>
            <p id="login-error" class="text-red-500 text-[10px] mt-4 font-bold opacity-0 uppercase">Código incorrecto</p>
        </div>
    </div>

    <!-- Modal Imágenes -->
    <div id="img-modal" onclick="this.style.display='none'">
        <img id="modal-content" class="max-w-full max-h-full rounded-lg shadow-2xl border-2 border-white">
    </div>

    <main id="chat-app" class="hidden flex-col min-h-[100dvh] max-w-md mx-auto w-full bg-slate-50/60 backdrop-blur-md shadow-2xl border-x border-slate-200 relative">
        <header class="p-4 bg-white/95 backdrop-blur-md border-b-2 border-yellow-400 sticky top-0 z-30 shadow-sm">
            <div class="flex justify-between items-center">
                <div>
                    <h2 class="font-black text-slate-800 text-xl">GRUPO Z</h2>
                    <span class="text-[9px] uppercase font-black text-slate-400">SINCRONIZADO CON LIMONES 🍋</span>
                </div>
                <div id="date-display" class="text-right font-black text-[10px] text-yellow-600 uppercase"></div>
            </div>
        </header>

        <div id="messages-container" class="flex-1 p-4 space-y-4 flex flex-col pb-6">
            <!-- Mensajes -->
        </div>

        <footer class="p-4 bg-white/95 backdrop-blur-md border-t border-slate-200 sticky bottom-0 z-30">
            <div id="emoji-panel" class="grid">
                <button onclick="sendEmojiDirect('😂')" class="text-xl p-1">😂</button>
                <button onclick="sendEmojiDirect('🍋')" class="text-xl p-1">🍋</button>
                <button onclick="sendEmojiDirect('🔥')" class="text-xl p-1">🔥</button>
                <button onclick="sendEmojiDirect('❤️')" class="text-xl p-1">❤️</button>
                <button onclick="sendEmojiDirect('👍')" class="text-xl p-1">👍</button>
                <button onclick="sendEmojiDirect('🙌')" class="text-xl p-1">🙌</button>
                <button onclick="sendEmojiDirect('😎')" class="text-xl p-1">😎</button>
                <button onclick="sendEmojiDirect('😮')" class="text-xl p-1">😮</button>
                <button onclick="sendEmojiDirect('😢')" class="text-xl p-1">😢</button>
                <button onclick="sendEmojiDirect('💯')" class="text-xl p-1">💯</button>
                <button onclick="sendEmojiDirect('✅')" class="text-xl p-1">✅</button>
                <button onclick="sendEmojiDirect('🤫')" class="text-xl p-1">🤫</button>
            </div>

            <div class="flex gap-2 items-center mb-2">
                <button onclick="toggleEmoji()" class="p-2 rounded-xl bg-slate-100 text-slate-500 hover:bg-yellow-100">😊</button>
                <button onclick="document.getElementById('img-input').click()" class="p-2 rounded-xl bg-slate-100 text-slate-500 hover:bg-yellow-100">📷</button>
                <input type="file" id="img-input" accept="image/*" class="hidden" onchange="uploadImage(this)">
                <button onclick="document.getElementById('video-input').click()" class="p-2 rounded-xl bg-slate-100 text-slate-500 hover:bg-yellow-100 text-lg flex items-center justify-center">🎥</button>
                <input type="file" id="video-input" accept="video/*" class="hidden" onchange="uploadVideo(this)">
            </div>

            <div class="flex gap-2 items-center">
                <div class="flex-1 flex items-center bg-slate-100 p-1 rounded-2xl border-2 border-transparent focus-within:border-yellow-400">
                    <input type="text" id="message-input" placeholder="Mensaje..." class="flex-1 bg-transparent px-4 py-2 outline-none font-bold text-sm">
                    
                    <button id="mic-btn" onclick="toggleRecording()" class="p-2 rounded-xl bg-slate-200 text-slate-600 transition-all">
                        <svg id="mic-icon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" /></svg>
                        <span id="stop-icon" class="hidden font-black text-[10px]">STOP</span>
                    </button>
                </div>

                <button id="send-btn" onclick="sendMessage()" class="accent-yellow p-4 rounded-2xl shadow-md active:scale-90 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M14 5l7 7m0 0l-7 7m7-7H3" /></svg>
                </button>
            </div>
            
            <div id="status-info" class="hidden text-center text-[10px] font-black mt-2 uppercase">
                <span id="status-text"></span> 
                <span id="audio-timer" class="ml-1 text-red-600"></span>
            </div>
        </footer>
    </main>

    <script>
        const GOOGLE_SHEETS_URL = 'https://script.google.com/macros/s/AKfycbxXtbU2gh_ulSw9e5WNl1JxbyWQ4nzn5DpeXix2N_c_ihL-7HYEOBhdqK5l6bk2mFsKDQ/exec';
        const IMGBB_API_KEY = '81ba81dc488dcf05bbca3a6aad307ce7';
        const DRIVE_APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyt-PCIO6BNorJ112fXX1y3ATx8A0_oIq9XWzLsDY6TqB0Rn-orLJhM-IonARugGHoDgQ/exec";

        let currentUser = null;
        let lastDataHash = "";
        let mediaRecorder = null;
        let audioChunks = [];
        let recordTimer = null;
        let seconds = 0;
        const users = { "7777": "Gines", "7676": "Antonio" };

        function attemptLogin() {
            const code = document.getElementById('access-code').value;
            if (users[code]) {
                currentUser = users[code];
                localStorage.setItem('grupoz_user', currentUser);
                showApp();
            } else {
                document.getElementById('login-error').style.opacity = "1";
            }
        }

        async function showApp() {
            document.getElementById('login-screen').classList.add('hidden');
            
            // Pedir permisos de audio al entrar
            try {
                await navigator.mediaDevices.getUserMedia({ audio: true });
            } catch (e) {
                console.log("Audio no habilitado");
            }

            document.getElementById('chat-app').classList.remove('hidden');
            document.getElementById('chat-app').classList.add('flex');
            document.getElementById('date-display').innerText = new Date().toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
            loadMessages();
            setInterval(loadMessages, 3000);
        }

        async function loadMessages() {
            try {
                const response = await fetch(GOOGLE_SHEETS_URL);
                const data = await response.json();
                const hash = JSON.stringify(data);
                if (hash !== lastDataHash) {
                    renderMessages(data);
                    lastDataHash = hash;
                }
            } catch (e) {}
        }

        function renderMessages(messages) {
            const container = document.getElementById('messages-container');
            const atBottom = (window.innerHeight + window.scrollY) >= document.body.offsetHeight - 150;
            container.innerHTML = '';
            let lastDate = "";

            messages.forEach(msg => {
                const dateLabel = new Date(msg.fecha).toLocaleDateString('es-ES', { day: 'numeric', month: 'long' });
                if (dateLabel !== lastDate) {
                    container.innerHTML += `<div class="text-center"><span class="date-separator">${dateLabel}</span></div>`;
                    lastDate = dateLabel;
                }
                const isMe = msg.usuario === currentUser;
                const isAntonio = msg.usuario === "Antonio";
                const isMedia = msg.mensaje.startsWith('data:audio') || msg.mensaje.includes('i.ibb.co') || msg.mensaje.includes('drive.google.com/file/d/');
                
                let contentHTML = "";
                if (msg.mensaje.startsWith('data:audio')) {
                    contentHTML = `<audio controls src="${msg.mensaje}"></audio>`;
                } else if (msg.mensaje.includes('i.ibb.co')) {
                    contentHTML = `<img src="${msg.mensaje}" class="chat-img" onclick="openZoom('${msg.mensaje}')">`;
                } else if (msg.mensaje.includes('drive.google.com/file/d/')) {
                    const match = msg.mensaje.match(/\/file\/d\/([^\/]+)/);
                    if (match && match[1]) {
                        const fileId = match[1];
                        contentHTML = `
                            <div class="relative w-full aspect-video rounded-xl overflow-hidden shadow-sm bg-black mt-1" style="min-width: 220px; max-width: 100%;">
                                <iframe src="https://drive.google.com/file/d/${fileId}/preview" class="absolute top-0 left-0 w-full h-full border-none" allow="autoplay" allowfullscreen></iframe>
                            </div>
                            <a href="${msg.mensaje}" target="_blank" class="text-[10px] text-slate-500 font-bold underline mt-2 inline-block uppercase">↗ Abrir en Drive</a>
                        `;
                    } else {
                        contentHTML = `<a href="${msg.mensaje}" target="_blank" class="text-blue-500 underline text-sm">${msg.mensaje}</a>`;
                    }
                } else {
                    contentHTML = `
                        <div class="flex items-start gap-2">
                            <p class="text-sm font-bold flex-1">${msg.mensaje}</p>
                            <button onclick="speakText('${msg.mensaje.replace(/'/g, "\\'")}')" class="tts-btn text-xs">🔊</button>
                        </div>
                    `;
                }

                container.innerHTML += `
                    <div class="flex flex-col ${isMe ? 'items-end' : 'items-start'} w-full">
                        <span class="text-[8px] font-black text-slate-400 mb-0.5 px-2 uppercase">${msg.usuario}</span>
                        <div class="message-bubble ${isAntonio ? 'bubble-antonio' : 'bubble-gines'}">
                            ${contentHTML}
                            <div class="text-[7px] font-black text-right mt-1 opacity-50">
                                ${new Date(msg.fecha).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}
                            </div>
                        </div>
                    </div>
                `;
            });
            if (atBottom) window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function speakText(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'es-ES';
                utterance.rate = 1;
                window.speechSynthesis.speak(utterance);
            }
        }

        async function uploadImage(input) {
            if (!input.files[0]) return;
            showStatus("Subiendo imagen...", "text-yellow-600");
            const fd = new FormData();
            fd.append('image', input.files[0]);
            try {
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: fd });
                const json = await res.json();
                if (json.success) await sendPayload(json.data.url);
            } catch (e) { showStatus("Error Imagen", "text-red-600"); }
            hideStatus();
        }

        async function uploadVideo(input) {
            if (!input.files[0]) return;
            const file = input.files[0];
            
            showStatus("Procesando video...", "text-yellow-600");
            
            const reader = new FileReader();
            reader.onload = async (e) => {
                showStatus("Subiendo a Drive (puede tardar)...", "text-yellow-600");
                try {
                    const base64 = e.target.result.split(',')[1];
                    const response = await fetch(DRIVE_APPS_SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify({
                            base64: base64,
                            mimeType: file.type,
                            fileName: file.name
                        })
                    });

                    const data = await response.json();
                    if (data.status === "success") {
                        showStatus("Video subido", "text-green-600");
                        await sendPayload(data.fileUrl);
                        input.value = ""; // Limpiar input para permitir subir el mismo archivo después si es necesario
                    } else {
                        throw new Error(data.error || "Error desconocido");
                    }
                } catch (err) {
                    console.error(err);
                    showStatus("Error al subir video", "text-red-600");
                }
                setTimeout(hideStatus, 4000);
            };
            
            reader.onerror = () => {
                showStatus("Error al leer archivo", "text-red-600");
                setTimeout(hideStatus, 3000);
            };

            reader.readAsDataURL(file);
        }

        async function toggleRecording() {
            if (mediaRecorder && mediaRecorder.state === 'recording') stopRecording(); else startRecording();
        }

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                seconds = 0;
                document.getElementById('mic-btn').classList.add('recording-pulse');
                document.getElementById('mic-icon').classList.add('hidden');
                document.getElementById('stop-icon').classList.remove('hidden');
                showStatus("GRABANDO", "text-red-600");
                recordTimer = setInterval(() => {
                    seconds++;
                    document.getElementById('audio-timer').innerText = `${seconds}/15s`;
                    if (seconds >= 15) stopRecording();
                }, 1000);
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.readAsDataURL(blob);
                    reader.onloadend = () => { if (reader.result.length > 500) sendPayload(reader.result); };
                    stream.getTracks().forEach(t => t.stop());
                };
                mediaRecorder.start();
            } catch(e) { showStatus("Error Micro", "text-red-600"); }
        }

        function stopRecording() {
            clearInterval(recordTimer);
            if (mediaRecorder) mediaRecorder.stop();
            document.getElementById('mic-btn').classList.remove('recording-pulse');
            document.getElementById('mic-icon').classList.remove('hidden');
            document.getElementById('stop-icon').classList.add('hidden');
            document.getElementById('audio-timer').innerText = "";
            hideStatus();
        }

        function toggleEmoji() {
            const panel = document.getElementById('emoji-panel');
            panel.style.display = panel.style.display === 'grid' ? 'none' : 'grid';
        }
        
        async function sendEmojiDirect(e) {
            toggleEmoji(); 
            await sendPayload(e); 
        }

        function showStatus(txt, cls) {
            const s = document.getElementById('status-info');
            const st = document.getElementById('status-text');
            s.classList.remove('hidden');
            st.innerText = txt;
            st.className = "font-black " + cls;
        }
        function hideStatus() { document.getElementById('status-info').classList.add('hidden'); }
        
        function openZoom(url) {
            document.getElementById('modal-content').src = url;
            document.getElementById('img-modal').style.display = 'flex';
        }

        async function sendMessage() {
            const input = document.getElementById('message-input');
            if (!input.value.trim()) return;
            const val = input.value;
            input.value = '';
            await sendPayload(val);
        }

        async function sendPayload(content) {
            if (!content) return;
            try {
                await fetch(GOOGLE_SHEETS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ usuario: currentUser, mensaje: content, fecha: new Date().toISOString() })
                });
                loadMessages();
            } catch(e) {}
        }

        window.onload = () => { 
            if (localStorage.getItem('grupoz_user')) { 
                currentUser = localStorage.getItem('grupoz_user'); 
                showApp(); 
            } 
        };
        document.getElementById('message-input').onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
    </script>
</body>
</html>
